; Upload-Grenzen für den Beleg-/Dokument-Upload (wird von all-inkl pro
; Verzeichnis gelesen). Der Browser-Upload nimmt sonst nur die Standard-
; max_file_uploads=20 Dateien pro Vorgang an – wir brauchen bis zu 500.
max_file_uploads = 500
post_max_size = 768M
upload_max_filesize = 25M
memory_limit = 768M
max_execution_time = 600
max_input_time = 600
